<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>HyperFIDS - Arrivals</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
<section id="headerofinterface">
    <h1>Arrivals</h1>
</section>
<section id="flights">
    <table>
        <tr id="colheader">
            <th>Airline</th>
            <th>Flight</th>
            <th>Arriving From</th>
            <th>Scheduled Arrival</th>
            <th>Status</th>
        </tr>
        <tr>
            <td>Atlas Global</td> <!--Airline-->
            <td>KK 1335</td> <!--Flight-->
            <td>Beirut</td> <!--Arriving From-->
            <td>08:40</td> <!--Scheduled Time-->
            <td>LANDED</td> <!--Status-->
        </tr>
        <tr>
            <td>Turkish Airlines</td> <!--Airline-->
            <td>TK 879</td> <!--Flight-->
            <td>Tehran</td> <!--Arriving From-->
            <td>08:40</td> <!--Scheduled Time-->
            <td>LANDED</td> <!--Status-->
        </tr>
    </table>
</section>
</body>
</html>
